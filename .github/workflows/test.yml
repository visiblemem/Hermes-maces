name: MACES Core

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: maces-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests __init__.py
      - run: pytest -q
      - name: Plugin layout smoke test
        run: |
          test -f plugin.yaml
          test -f __init__.py
          grep -q '^manifest_version: 1$' plugin.yaml
          grep -q '^name: hermes-maces$' plugin.yaml
          grep -q 'from maces.plugin import register' __init__.py
