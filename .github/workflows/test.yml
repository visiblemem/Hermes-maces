name: MACES Core

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: maces-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-security:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests __init__.py
      - name: Compile
        run: python -m compileall -q src __init__.py
      - name: Unit and security tests
        run: pytest -q -m "not e2e"
      - name: Public repository boundary
        run: |
          python scripts/check_public_boundary.py
          grep -q 'version: "1.2.0"' plugin.yaml
          grep -q 'version = "1.2.0"' pyproject.toml
          grep -q '^## 1.2.0$' CHANGELOG.md
          grep -q '^provides_tools: \[\]$' plugin.yaml
          test ! -f config.yaml
          test ! -d data
      - name: Build package metadata
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  hermes-plugin-manager-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pip install 'hermes-agent==0.18.2'
      - name: Real Hermes PluginManager E2E
        run: pytest -q -m e2e
